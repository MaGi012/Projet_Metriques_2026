<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Contact</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 520px;
            background: white;
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
        }

        h1 {
            text-align: center;
            color: #0d6efd;
            margin-bottom: 10px;
        }

        p {
            text-align: center;
            color: #555;
            margin-bottom: 30px;
        }

        label {
            font-weight: bold;
            color: #333;
        }

        input, textarea {
            width: 100%;
            padding: 14px;
            margin: 8px 0 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 15px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #0d6efd;
            box-shadow: 0 0 5px rgba(13,110,253,0.4);
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: #0d6efd;
            color: white;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #084298;
        }

        .retour {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #0d6efd;
            text-decoration: none;
            font-weight: bold;
        }

        .retour:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>Contact</h1>
        <p>Vous pouvez me laisser un message grâce au formulaire ci-dessous.</p>

        <form>
            <label>Nom</label>
            <input type="text" placeholder="Entrez votre nom">

            <label>Prénom</label>
            <input type="text" placeholder="Entrez votre prénom">

            <label>Message</label>
            <textarea rows="6" placeholder="Écrivez votre message ici..."></textarea>

            <button type="submit">Envoyer le message</button>
        </form>

        <a class="retour" href="/">⬅ Retour à l’accueil</a>
    </div>

</body>
</html>
