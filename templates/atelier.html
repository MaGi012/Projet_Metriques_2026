<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Atelier</title>

    <script src="https://www.gstatic.com/charts/loader.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            text-align: center;
            margin: 30px;
        }

        #chart {
            width: 500px;
            height: 400px;
            margin: auto;
        }

        a {
            display: inline-block;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<a href="/">⬅ Retour accueil</a>

<h1>Atelier : Vitesse du vent à Marseille</h1>

<p>Indicateur météo basé sur l’API Open-Meteo.</p>

<div id="chart"></div>

<script>
google.charts.load('current', {'packages':['gauge']});
google.charts.setOnLoadCallback(drawChart);

async function drawChart() {
    const response = await fetch("/marseille");
    const json = await response.json();

    const wind = Number(json[0].wind_speed);

    const data = google.visualization.arrayToDataTable([
        ['Label', 'Value'],
        ['Vent km/h', wind]
    ]);

    const options = {
        width: 500,
        height: 400,
        redFrom: 50,
        redTo: 80,
        yellowFrom: 30,
        yellowTo: 50,
        minorTicks: 5,
        max: 80
    };

    const chart = new google.visualization.Gauge(document.getElementById('chart'));
    chart.draw(data, options);
}
</script>

</body>
</html>
