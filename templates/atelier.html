<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Atelier</title>
    <script src="https://www.gstatic.com/charts/loader.js"></script>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 40px;
            text-align: center;
        }

        h1 {
            color: #0d6efd;
        }

        .description {
            max-width: 800px;
            margin: auto;
            color: #555;
            font-size: 17px;
        }

        .box {
            width: 90%;
            max-width: 1000px;
            height: 620px;
            margin: 30px auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
            padding: 20px;
        }

        #chart {
            width: 100%;
            height: 100%;
        }

        #loading {
            font-size: 22px;
            color: #555;
            margin-top: 200px;
        }

        a {
            display: inline-block;
            margin-bottom: 20px;
            text-decoration: none;
            font-weight: bold;
            color: #0d6efd;
        }
    </style>
</head>

<body>

<a href="/">⬅ Retour à l'accueil</a>

<h1>Atelier : Répartition du vent à Marseille</h1>

<p class="description">
    Ce graphique présente la répartition des prévisions de vent à Marseille selon trois niveaux :
    faible, modéré et fort.
</p>

<div class="box">
    <div id="loading">⏳ Chargement du graphique...</div>
    <div id="chart"></div>
</div>

<script>
google.charts.load('current', {'packages':['corechart']});
google.charts.setOnLoadCallback(drawChart);

async function drawChart() {
    try {
        const response = await fetch("/marseille");
        const json = await response.json();

        let faible = 0;
        let modere = 0;
        let fort = 0;

        json.forEach(e => {
            let vent = Number(e.wind_speed);

            if (vent < 15) {
                faible++;
            } else if (vent < 30) {
                modere++;
            } else {
                fort++;
            }
        });

        const data = google.visualization.arrayToDataTable([
            ['Niveau de vent', 'Nombre d’heures'],
            ['Vent faible', faible],
            ['Vent modéré', modere],
            ['Vent fort', fort]
        ]);

        const options = {
            title: 'Répartition du vent à Marseille',
            pieHole: 0.35
        };

        document.getElementById("loading").style.display = "none";

        const chart = new google.visualization.PieChart(document.getElementById("chart"));
        chart.draw(data, options);

    } catch (error) {
        document.getElementById("loading").innerHTML = "Erreur de chargement du graphique.";
        console.error(error);
    }
}
</script>

</body>
</html>
