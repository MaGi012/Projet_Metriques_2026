<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<title>Histogramme</title>

<script src="https://www.gstatic.com/charts/loader.js"></script>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#f4f6f9;
margin:40px;
text-align:center;
}

h1{
color:#0d6efd;
}

#chart{
width:100%;
height:600px;
margin:auto;
display:none;
}

#loading{
margin-top:80px;
font-size:24px;
color:#555;
}

a{
display:inline-block;
margin-bottom:30px;
text-decoration:none;
font-weight:bold;
color:#0d6efd;
}

</style>

</head>

<body>

<a href="/">⬅ Retour à l'accueil</a>

<h1>Histogramme des températures de Paris</h1>

<div id="loading">
⏳ Chargement du graphique...
</div>

<div id="chart"></div>

<script>

google.charts.load('current',{'packages':['corechart']});
google.charts.setOnLoadCallback(drawChart);

async function drawChart(){

const response=await fetch("/paris");

const json=await response.json();

const data=new google.visualization.DataTable();

data.addColumn('string','Date');

data.addColumn('number','Température');

json.slice(0,24).forEach(e=>{

data.addRow([
e.datetime.substring(5,16),
Number(e.temperature_c)
]);

});

const options={

title:'Températures horaires à Paris',

legend:{position:'bottom'},

hAxis:{title:'Date'},

vAxis:{title:'Température (°C)'}

};

const chart=new google.visualization.ColumnChart(document.getElementById("chart"));

chart.draw(data,options);

document.getElementById("loading").style.display="none";
document.getElementById("chart").style.display="block";

}

</script>

</body>

</html>
