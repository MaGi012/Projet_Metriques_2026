<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Histogramme</title>
    <script src="https://www.gstatic.com/charts/loader.js"></script>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 40px;
            text-align: center;
        }

        h1 {
            color: #0d6efd;
        }

        .box {
            width: 90%;
            max-width: 1200px;
            height: 650px;
            margin: 30px auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
            padding: 20px;
        }

        #chart {
            width: 100%;
            height: 100%;
        }

        #loading {
            font-size: 22px;
            color: #555;
            margin-top: 200px;
        }

        a {
            display: inline-block;
            margin-bottom: 20px;
            text-decoration: none;
            font-weight: bold;
            color: #0d6efd;
        }
    </style>
</head>

<body>

<a href="/">⬅ Retour à l'accueil</a>

<h1>Histogramme des températures de Paris</h1>

<div class="box">
    <div id="loading">⏳ Chargement du graphique...</div>
    <div id="chart"></div>
</div>

<script>
google.charts.load('current', {'packages':['corechart']});
google.charts.setOnLoadCallback(drawChart);

async function drawChart() {
    try {
        const response = await fetch("/paris");
        const json = await response.json();

        const data = new google.visualization.DataTable();
        data.addColumn('string', 'Date');
        data.addColumn('number', 'Température °C');

        json.slice(0, 24).forEach(e => {
            data.addRow([
                e.datetime.substring(5, 16),
                Number(e.temperature_c)
            ]);
        });

        const options = {
            title: 'Températures horaires à Paris',
            legend: { position: 'bottom' },
            hAxis: { title: 'Date / Heure' },
            vAxis: { title: 'Température (°C)' },
            width: '100%',
            height: '100%'
        };

        document.getElementById("loading").style.display = "none";

        const chart = new google.visualization.ColumnChart(document.getElementById("chart"));
        chart.draw(data, options);

    } catch (error) {
        document.getElementById("loading").innerHTML = "Erreur de chargement du graphique.";
        console.error(error);
    }
}
</script>

</body>
</html>
